# === Redis Persistence Configuration ===
# collectorinfra 스키마 캐시용 Redis 영속성 설정

# --- RDB 스냅샷 ---
# 3600초(1시간) 내 1건 이상 변경 시 스냅샷
# 300초(5분) 내 100건 이상 변경 시 스냅샷
# 60초(1분) 내 10000건 이상 변경 시 스냅샷
save 3600 1
save 300 100
save 60 10000

dbfilename dump.rdb
dir /data

# RDB 저장 실패 시 쓰기 거부 (데이터 유실 방지)
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes

# --- AOF (Append Only File) ---
appendonly yes
appendfilename "appendonly.aof"

# fsync 정책: everysec (성능과 안정성 균형, 최대 1초 데이터 유실)
appendfsync everysec

# AOF rewrite 중 fsync 비활성화 (성능 우선, rewrite 실패 시에도 기존 AOF 유지)
no-appendfsync-on-rewrite no

# AOF 자동 rewrite 조건
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# --- 메모리 ---
maxmemory 256mb
maxmemory-policy noeviction

# --- 로깅 ---
loglevel notice
