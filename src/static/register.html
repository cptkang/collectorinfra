<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 인프라 데이터 조회 에이전트</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .auth-card {
            background: var(--bg-card, #1e1e2e);
            border: 1px solid var(--border, #333);
            border-radius: 12px;
            padding: 32px;
        }
        .auth-card h2 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 1.5rem;
        }
        .auth-form .form-group {
            margin-bottom: 16px;
        }
        .auth-form label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary, #aaa);
        }
        .auth-form input[type="text"],
        .auth-form input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input, #2a2a3e);
            border: 1px solid var(--border, #444);
            border-radius: 8px;
            color: var(--text-primary, #eee);
            font-size: 0.9375rem;
            box-sizing: border-box;
        }
        .auth-form input:focus {
            outline: none;
            border-color: var(--accent, #7c3aed);
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent, #7c3aed);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .auth-btn:hover {
            opacity: 0.9;
        }
        .auth-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .auth-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 0.875rem;
            color: var(--text-secondary, #aaa);
        }
        .auth-footer a {
            color: var(--accent, #7c3aed);
            text-decoration: none;
        }
        .auth-error, .auth-success {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 16px;
            display: none;
        }
        .auth-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }
        .auth-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .auth-logo svg {
            width: 48px;
            height: 48px;
            fill: var(--accent, #7c3aed);
        }
        .form-hint {
            font-size: 0.75rem;
            color: var(--text-muted, #777);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>INFRA QUERY AGENT</h1>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            </div>
            <h2>회원가입</h2>

            <div class="auth-error" id="registerError"></div>
            <div class="auth-success" id="registerSuccess"></div>

            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label for="userId">사용자 ID</label>
                    <input type="text" id="userId" name="user_id" required pattern="^[a-zA-Z0-9_]+$" minlength="3" maxlength="50" placeholder="영문, 숫자, _ 조합">
                    <div class="form-hint">3자 이상, 영문/숫자/밑줄만 사용 가능</div>
                </div>
                <div class="form-group">
                    <label for="username">이름</label>
                    <input type="text" id="username" name="username" required maxlength="100" placeholder="표시 이름">
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" required minlength="8" placeholder="8자 이상">
                    <div class="form-hint">최소 8자 이상</div>
                </div>
                <div class="form-group">
                    <label for="passwordConfirm">비밀번호 확인</label>
                    <input type="password" id="passwordConfirm" required minlength="8" placeholder="비밀번호 재입력">
                </div>
                <div class="form-group">
                    <label for="department">부서 (선택)</label>
                    <input type="text" id="department" name="department" maxlength="100" placeholder="소속 부서">
                </div>
                <button type="submit" class="auth-btn" id="registerBtn">가입하기</button>
            </form>

            <div class="auth-footer">
                이미 계정이 있으신가요? <a href="/login">로그인</a>
            </div>
        </div>
    </div>

    <script>
    (function() {
        "use strict";

        var form = document.getElementById("registerForm");
        var errorEl = document.getElementById("registerError");
        var successEl = document.getElementById("registerSuccess");
        var registerBtn = document.getElementById("registerBtn");

        form.addEventListener("submit", function(e) {
            e.preventDefault();
            errorEl.style.display = "none";
            successEl.style.display = "none";

            var password = document.getElementById("password").value;
            var confirm = document.getElementById("passwordConfirm").value;

            if (password !== confirm) {
                errorEl.textContent = "비밀번호가 일치하지 않습니다.";
                errorEl.style.display = "block";
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = "가입 중...";

            var body = {
                user_id: document.getElementById("userId").value.trim(),
                username: document.getElementById("username").value.trim(),
                password: password,
                department: document.getElementById("department").value.trim() || null
            };

            fetch("/api/v1/auth/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body)
            })
            .then(function(res) {
                if (!res.ok) {
                    return res.json().then(function(data) {
                        throw new Error(data.detail || "가입에 실패했습니다.");
                    });
                }
                return res.json();
            })
            .then(function(data) {
                successEl.textContent = "가입이 완료되었습니다. 로그인 페이지로 이동합니다.";
                successEl.style.display = "block";
                form.reset();
                setTimeout(function() {
                    window.location.href = "/login";
                }, 1500);
            })
            .catch(function(err) {
                errorEl.textContent = err.message;
                errorEl.style.display = "block";
                registerBtn.disabled = false;
                registerBtn.textContent = "가입하기";
            });
        });
    })();
    </script>
</body>
</html>
