version: "3.8"

services:
  db2:
    image: icr.io/db2_community/db2
    platform: linux/amd64
    container_name: infra_db2
    privileged: true
    deploy:
      resources:
        limits:
          memory: 8g
        reservations:
          memory: 4g
    environment:
      LICENSE: accept
      DB2INST1_PASSWORD: db2pass2024
      DBNAME: infradb
      BLU: "false"
      ENABLE_ORACLE_COMPATIBILITY: "false"
      SAMPLEDB: "false"
      PERSISTENT_HOME: "true"
    ports:
      - "50000:50000"
    volumes:
      - db2data:/database
      - ./init:/var/custom
    healthcheck:
      test: [ "CMD", "su", "-", "db2inst1", "-c", "db2 connect to infradb" ]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 300s

volumes:
  db2data:
